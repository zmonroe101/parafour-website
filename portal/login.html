<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Parafour Contractor Portal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><circle cx='20' cy='20' r='20' fill='%232E7D32'/><text x='20' y='28' text-anchor='middle' fill='white' font-family='Inter,sans-serif' font-size='22' font-weight='800'>4</text></svg>" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-card-logo">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="20" cy="20" r="20" fill="#2E7D32"/>
          <text x="20" y="28" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="800">4</text>
        </svg>
        <span>Parafour Innovations</span>
      </div>

      <h2>Contractor Portal</h2>
      <p class="auth-card-sub">Sign in to access resources and support.</p>

      <div class="auth-error" id="loginError"></div>
      <div class="auth-success" id="loginSuccess"></div>

      <form class="auth-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email address</label>
          <input type="email" id="loginEmail" name="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="auth-forgot" id="forgotBtn">Forgot password?</button>
        </div>
        <button type="submit" class="btn-auth" id="loginBtn">Sign In</button>
      </form>

      <hr class="auth-divider" />

      <p class="auth-link">
        Don't have an account? <a href="/portal/register.html">Request access</a>
      </p>
      <p class="auth-link" style="margin-top:6px;">
        <a href="/" style="color:#6B7280; font-size:.78rem;">← Back to Parafour.com</a>
      </p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/portal.js"></script>
  <script>
    (async () => {
      const user = await getCurrentUser();
      if (user) {
        window.location.replace('/portal/');
      }
    })();
    document.addEventListener('DOMContentLoaded', initLoginForm);
  </script>

</body>
</html>
